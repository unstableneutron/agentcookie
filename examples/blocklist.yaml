# blocklist.yaml: domains to KEEP on this machine (NOT synced to the peer).
#
# v0.3 sync-all default: agentcookie syncs every cookie unless its host_key
# matches a pattern in this file. Add sites here that you specifically do
# not want flowing to the sink machine.
#
# This file is OPTIONAL. If you do not create it at
# ~/.config/agentcookie/blocklist.yaml, agentcookie syncs everything.
#
# Pattern syntax: SQLite LIKE, '%' is a wildcard. Matching is case-
# insensitive and matches against Chrome's host_key (which includes a
# leading dot for subdomain cookies).
#
# Prefer `agentcookie accounts off <domain>` for normal site toggles. It writes
# both the exact host and subdomain-safe pattern without matching sibling domains.
#
# Both source and sink read this file independently. The sink owner has the
# final say on what state lands on their machine.

version: 1

domains:
